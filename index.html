<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bank Konten — Ditranmas Kemendukbangga/BKKBN</title>
<meta name="description" content="Arsip konten resmi Direktorat Bina Peran Serta Masyarakat, Kemendukbangga/BKKBN — cari dan unduh konten kapan saja." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=Poppins:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  :root {
    --blue-deep: #123a5c;
    --blue: #1d71b8;
    --blue-light: #89cfe8;
    --blue-pale: #e7f2fa;
    --gold-deep: #ae862e;
    --gold: #d2ac47;
    --gold-light: #edc968;
    --gold-pale: #fbf1d6;
    --paper: #F1EFE6;
    --surface: #FFFFFF;
    --ink: #26251F;
    --ink-muted: #6B685D;
    --line: #DBD6C7;
    --radius: 10px;
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Inter', system-ui, sans-serif;
    line-height: 1.5;
  }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 0 24px; }
  .site-header {
    background: linear-gradient(135deg, var(--blue-deep) 0%, var(--blue) 55%, var(--blue-light) 130%);
    color: #fff;
    padding: 48px 0 40px;
  }
  .site-header .logo { height: 44px; width: auto; margin-bottom: 16px; display: block; }
  .site-header h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(32px, 5vw, 48px);
    font-weight: 700;
    margin: 0 0 8px;
    text-transform: uppercase;
    letter-spacing: 0.02em;
  }
  .site-header .lead {
    font-family: 'Poppins', sans-serif;
    font-size: 16px;
    color: #E3ECF5;
    margin: 0;
    max-width: 44ch;
  }
  main.wrap { padding-top: 32px; padding-bottom: 64px; }
  .controls { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
  #search, #category {
    height: 46px;
    padding: 0 16px;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    background: var(--surface);
    color: var(--ink);
  }
  #search { flex: 1 1 280px; }
  #category { flex: 0 1 220px; }
  #search:focus-visible, #category:focus-visible {
    outline: 2px solid var(--blue);
    outline-offset: 1px;
  }
  .count { font-size: 13px; color: var(--ink-muted); margin: 0 0 20px; }
  .status { padding: 32px 0; text-align: center; color: var(--ink-muted); }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
    gap: 16px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(18, 58, 92, 0.1); }
  .card-top { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .kode {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--blue-deep);
    background: var(--blue-pale);
    border: 1px solid var(--blue-light);
    border-radius: 4px;
    padding: 2px 6px;
  }
  .tag { font-size: 11px; font-weight: 600; color: var(--blue-deep); background: var(--gold-pale); border-radius: 4px; padding: 2px 8px; }
  .tag-muted { color: var(--ink-muted); background: var(--paper); }
  .judul {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 17px;
    font-weight: 500;
    margin: 0;
    line-height: 1.3;
    letter-spacing: -0.01em;
  }
  .caption { font-family: 'Poppins', sans-serif; font-size: 13.5px; color: var(--ink-muted); margin: 0; white-space: pre-line; }
  .btn {
    margin-top: auto;
    display: inline-block;
    text-align: center;
    padding: 10px 14px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
    color: var(--blue-deep);
    text-decoration: none;
    font-size: 14px;
    font-weight: 600;
    transition: background 0.15s ease, transform 0.15s ease;
  }
  .btn:hover { background: linear-gradient(135deg, var(--gold-deep) 0%, var(--gold) 100%); }
  .btn:focus-visible { outline: 2px solid var(--blue); outline-offset: 2px; }
  .btn-disabled { background: var(--paper); color: var(--ink-muted); border: 1px dashed var(--line); cursor: default; }
  .btn-group { display: flex; flex-direction: column; gap: 6px; margin-top: auto; }
  .btn-group .btn { margin-top: 0; }
  .pagination { display: flex; align-items: center; justify-content: center; gap: 16px; margin-top: 32px; }
  .pagination button {
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: var(--surface);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    cursor: pointer;
  }
  .pagination button:hover:not(:disabled) { background: var(--blue-pale); border-color: var(--blue-light); }
  .pagination button:disabled { opacity: 0.4; cursor: default; }
  .pagination .page-info { font-size: 13px; color: var(--ink-muted); }
  .site-footer { border-top: 1px solid var(--line); padding: 24px; text-align: center; font-size: 12.5px; color: var(--ink-muted); }
  .site-footer .footer-org {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--blue);
    margin: 0 0 6px;
  }
  @media (max-width: 600px) {
    .controls { flex-direction: column; }
    #category { flex-basis: auto; }
  }
  @media (prefers-reduced-motion: reduce) {
    .card, .btn { transition: none; }
  }
</style>
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <img src="logo.png" alt="Logo Ditranmas" class="logo" onerror="this.style.display='none'" />
      <h1>Bank Konten</h1>
      <p class="lead">Arsip konten resmi yang bisa dicari dan diunduh siapa saja.</p>
    </div>
  </header>

  <main class="wrap">
    <div class="controls">
      <input id="search" type="text" placeholder="Cari judul atau kata kunci..." aria-label="Cari konten" />
      <select id="category" aria-label="Filter kategori">
        <option value="__all__">Semua kategori</option>
      </select>
    </div>
    <p id="count" class="count" aria-live="polite">Memuat konten&hellip;</p>
    <p id="status" class="status" style="display:none;"></p>
    <div id="grid" class="grid"></div>
    <div id="pagination" class="pagination"></div>
  </main>

  <footer class="site-footer">
    <p class="footer-org">Direktorat Bina Peran Serta Masyarakat &middot; Kemendukbangga/BKKBN</p>
    <p>Bank Konten diproduksi oleh Ditranmas.</p>
  </footer>

<script>
  var CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQM1hUO5g2v9dHkylwc9PxIRjK0gfU6z-nEg58y2Y7fD7ps6ZBkPKBY7q6i3DsKh8-8ksy1wKgKqUPC/pub?gid=667875816&single=true&output=csv";
  var PAGE_SIZE = 10;

  var allItems = [];
  var currentFiltered = [];
  var currentPage = 1;

  var grid = document.getElementById('grid');
  var statusEl = document.getElementById('status');
  var searchInput = document.getElementById('search');
  var categorySelect = document.getElementById('category');
  var countEl = document.getElementById('count');
  var paginationEl = document.getElementById('pagination');

  function extractUrls(str) {
    if (!str) return [];
    var matches = str.match(/https?:\/\/[^\s"'<>]+/g);
    return matches || [];
  }

  function truncate(text, max) {
    if (!text) return '';
    var clean = text.trim();
    if (clean.length <= max) return clean;
    return clean.slice(0, max).trim() + '\u2026';
  }

  function escapeHtml(str) {
    var div = document.createElement('div');
    div.textContent = str || '';
    return div.innerHTML;
  }

  function renderCards(items) {
    if (items.length === 0) {
      grid.innerHTML = '';
      statusEl.textContent = 'Tidak ada konten yang cocok. Coba kata kunci lain.';
      statusEl.style.display = 'block';
      return;
    }
    statusEl.style.display = 'none';
    var html = '';
    for (var i = 0; i < items.length; i++) {
      var item = items[i];
      var kode = escapeHtml(item['Kode Konten'] || '');
      var kategori = (item['Kategori'] || '').trim();
      var judul = escapeHtml(item['Judul'] || 'Tanpa judul');
      var caption = escapeHtml(truncate(item['Caption'], 160));
      var urls = extractUrls(item['Link File']);

      html += '<article class="card">';
      html += '<div class="card-top">';
      if (kode) html += '<span class="kode">' + kode + '</span>';
      html += kategori
        ? '<span class="tag">' + escapeHtml(kategori) + '</span>'
        : '<span class="tag tag-muted">Belum dikategorikan</span>';
      html += '</div>';
      html += '<h3 class="judul">' + judul + '</h3>';
      if (caption) html += '<p class="caption">' + caption + '</p>';
      if (urls.length === 0) {
        html += '<span class="btn btn-disabled">Tautan belum tersedia</span>';
      } else if (urls.length === 1) {
        html += '<a class="btn" href="' + escapeHtml(urls[0]) + '" target="_blank" rel="noopener">Lihat &amp; unduh</a>';
      } else {
        html += '<div class="btn-group">';
        for (var u = 0; u < urls.length; u++) {
          html += '<a class="btn" href="' + escapeHtml(urls[u]) + '" target="_blank" rel="noopener">Unduh ' + (u + 1) + '</a>';
        }
        html += '</div>';
      }
      html += '</article>';
    }
    grid.innerHTML = html;
  }

  function renderPagination(totalPages) {
    if (totalPages <= 1) {
      paginationEl.innerHTML = '';
      return;
    }
    var html = '';
    html += '<button type="button" id="prevPage"' + (currentPage === 1 ? ' disabled' : '') + '>&lsaquo; Sebelumnya</button>';
    html += '<span class="page-info">Halaman ' + currentPage + ' dari ' + totalPages + '</span>';
    html += '<button type="button" id="nextPage"' + (currentPage === totalPages ? ' disabled' : '') + '>Selanjutnya &rsaquo;</button>';
    paginationEl.innerHTML = html;

    document.getElementById('prevPage').addEventListener('click', function () {
      if (currentPage > 1) {
        currentPage--;
        renderPage();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    });
    document.getElementById('nextPage').addEventListener('click', function () {
      if (currentPage < totalPages) {
        currentPage++;
        renderPage();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    });
  }

  function renderPage() {
    var total = currentFiltered.length;
    var totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
    if (currentPage > totalPages) currentPage = totalPages;
    var start = (currentPage - 1) * PAGE_SIZE;
    var pageItems = currentFiltered.slice(start, start + PAGE_SIZE);

    countEl.textContent = total === 0
      ? '0 dari ' + allItems.length + ' konten'
      : 'Menampilkan ' + (start + 1) + '\u2013' + Math.min(start + PAGE_SIZE, total) + ' dari ' + total + ' konten';

    renderCards(pageItems);
    renderPagination(totalPages);
  }

  function applyFilters() {
    var q = searchInput.value.trim().toLowerCase();
    var cat = categorySelect.value;
    currentFiltered = allItems.filter(function (item) {
      var matchesQuery = !q ||
        (item['Judul'] || '').toLowerCase().indexOf(q) !== -1 ||
        (item['Caption'] || '').toLowerCase().indexOf(q) !== -1 ||
        (item['Kode Konten'] || '').toLowerCase().indexOf(q) !== -1;
      var itemCat = (item['Kategori'] || '').trim();
      var matchesCat = cat === '__all__' ||
        (cat === '__uncategorized__' ? itemCat === '' : itemCat === cat);
      return matchesQuery && matchesCat;
    });
    currentPage = 1;
    renderPage();
  }

  function populateCategories(items) {
    var cats = [];
    var seen = {};
    var hasUncategorized = false;
    items.forEach(function (item) {
      var c = (item['Kategori'] || '').trim();
      if (c) {
        if (!seen[c]) { seen[c] = true; cats.push(c); }
      } else {
        hasUncategorized = true;
      }
    });
    cats.sort();
    var html = '<option value="__all__">Semua kategori</option>';
    cats.forEach(function (c) {
      html += '<option value="' + escapeHtml(c) + '">' + escapeHtml(c) + '</option>';
    });
    if (hasUncategorized) html += '<option value="__uncategorized__">Belum dikategorikan</option>';
    categorySelect.innerHTML = html;
  }

  Papa.parse(CSV_URL, {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete: function (results) {
      allItems = (results.data || []).filter(function (item) {
        return item['Judul'] && item['Judul'].trim();
      });
      populateCategories(allItems);
      applyFilters();
    },
    error: function () {
      countEl.textContent = '';
      grid.innerHTML = '';
      statusEl.textContent = 'Gagal memuat data. Coba muat ulang halaman beberapa saat lagi.';
      statusEl.style.display = 'block';
    }
  });

  searchInput.addEventListener('input', applyFilters);
  categorySelect.addEventListener('change', applyFilters);
</script>
</body>
</html>
